<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" preserveAspectRatio="xMidYMid slice" overflow="hidden" style="display:block">
  <defs>

    <filter id="gb" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="100"/>
    </filter>
    <filter id="gm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="0.75" cy="0.75" r="0.75" fill="white" fill-opacity="0.065"/>
    </pattern>

    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#0B0C14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B0C14" stop-opacity="0.5"/>
    </linearGradient>

  </defs>

  <!-- ── 1. Base ───────────────────────────────────────────── -->
  <rect width="1440" height="900" fill="#0B0C14"/>

  <!-- ── 2. Glow orbs ─────────────────────────────────────── -->
  <circle cx="80"   cy="80"  r="300" fill="#5B6AF5" opacity="0.13" filter="url(#gb)"/>
  <circle cx="1380" cy="160" r="260" fill="#8B4CF7" opacity="0.11" filter="url(#gb)"/>
  <circle cx="160"  cy="840" r="220" fill="#F0A855" opacity="0.09" filter="url(#gm)"/>
  <circle cx="1360" cy="800" r="200" fill="#2DDBA8" opacity="0.08" filter="url(#gm)"/>
  <circle cx="720"  cy="430" r="380" fill="#5B6AF5" opacity="0.033" filter="url(#gb)"/>

  <!-- ── 3. Dot grid ──────────────────────────────────────── -->
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- ── 4. Large background rings ───────────────────────── -->
  <circle cx="160"  cy="180" r="540" fill="none" stroke="#5B6AF5" stroke-opacity="0.05"  stroke-width="1"/>
  <circle cx="1300" cy="720" r="460" fill="none" stroke="#8B4CF7" stroke-opacity="0.05"  stroke-width="1"/>
  <circle cx="720"  cy="450" r="300" fill="none" stroke="#5B6AF5" stroke-opacity="0.055" stroke-width="1" stroke-dasharray="3 9"/>

  <!-- ── 5. Corner arcs ───────────────────────────────────── -->
  <path d="M 60 300 A 220 220 0 0 1 360 140"   fill="none" stroke="#5B6AF5" stroke-opacity="0.16" stroke-width="0.75"/>
  <path d="M 1390 360 A 200 200 0 0 0 1100 230" fill="none" stroke="#8B4CF7" stroke-opacity="0.16" stroke-width="0.75"/>
  <path d="M 100 650 A 180 180 0 0 1 270 840"   fill="none" stroke="#F0A855" stroke-opacity="0.13" stroke-width="0.75"/>
  <path d="M 1340 680 A 160 160 0 0 0 1190 830" fill="none" stroke="#2DDBA8" stroke-opacity="0.13" stroke-width="0.75"/>

  <!-- ── 6. Diagonal edge lines ───────────────────────────── -->
  <line x1="420"  y1="0"   x2="0"    y2="340" stroke="#5B6AF5" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="1440" y1="380" x2="1080" y2="0"   stroke="#8B4CF7" stroke-opacity="0.07" stroke-width="0.5"/>
  <line x1="0"    y1="590" x2="310"  y2="900" stroke="#F0A855" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="1440" y1="620" x2="1200" y2="900" stroke="#2DDBA8" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- ── 7. Constellation lines ───────────────────────────── -->
  <line x1="550"  y1="790" x2="690"  y2="830" stroke="#2DDBA8" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="130"  y1="430" x2="230"  y2="560" stroke="#8B97FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="1290" y1="450" x2="1390" y2="340" stroke="#8B4CF7" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="600"  y1="260" x2="770"  y2="270" stroke="#8B97FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="1160" y1="490" x2="1210" y2="590" stroke="#2DDBA8" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="390"  y1="130" x2="470"  y2="410" stroke="#8B97FF" stroke-opacity="0.12" stroke-width="0.5"/>
  <line x1="870"  y1="110" x2="1070" y2="210" stroke="#2DDBA8" stroke-opacity="0.12" stroke-width="0.5"/>

  <!-- ── 8. Scattered accent dots ─────────────────────────── -->
  <circle cx="390"  cy="130" r="3"   fill="#8B97FF" fill-opacity="0.55"/>
  <circle cx="1070" cy="210" r="2.5" fill="#2DDBA8" fill-opacity="0.50"/>
  <circle cx="230"  cy="560" r="3"   fill="#F0A855" fill-opacity="0.45"/>
  <circle cx="1290" cy="450" r="2.5" fill="#8B4CF7" fill-opacity="0.50"/>
  <circle cx="550"  cy="790" r="2.5" fill="#8B97FF" fill-opacity="0.40"/>
  <circle cx="1110" cy="730" r="3"   fill="#F0A855" fill-opacity="0.40"/>
  <circle cx="870"  cy="110" r="2"   fill="#2DDBA8" fill-opacity="0.45"/>
  <circle cx="470"  cy="410" r="1.5" fill="#8B97FF" fill-opacity="0.40"/>
  <circle cx="1210" cy="590" r="2"   fill="#2DDBA8" fill-opacity="0.35"/>
  <circle cx="690"  cy="830" r="2.5" fill="#F0A855" fill-opacity="0.35"/>
  <circle cx="130"  cy="430" r="2"   fill="#8B97FF" fill-opacity="0.35"/>
  <circle cx="1390" cy="340" r="2"   fill="#F0A855" fill-opacity="0.30"/>
  <circle cx="770"  cy="270" r="1.5" fill="#2DDBA8" fill-opacity="0.35"/>
  <circle cx="310"  cy="870" r="2"   fill="#8B4CF7" fill-opacity="0.30"/>
  <circle cx="990"  cy="810" r="1.5" fill="#8B97FF" fill-opacity="0.30"/>
  <circle cx="600"  cy="260" r="2"   fill="#8B4CF7" fill-opacity="0.30"/>
  <circle cx="1160" cy="490" r="1.5" fill="#F0A855" fill-opacity="0.30"/>
  <circle cx="430"  cy="690" r="2"   fill="#2DDBA8" fill-opacity="0.30"/>
  <circle cx="1020" cy="380" r="1.5" fill="#8B97FF" fill-opacity="0.28"/>
  <circle cx="340"  cy="380" r="1.5" fill="#F0A855" fill-opacity="0.25"/>

  <!-- ── 9. Cross / plus marks ────────────────────────────── -->
  <g stroke="#8B97FF" stroke-opacity="0.28" stroke-width="1" fill="none">
    <path d="M 495 215 h10 m-5-5 v10"/>
    <path d="M 1145 355 h10 m-5-5 v10"/>
    <path d="M 345 655 h8 m-4-4 v8"/>
    <path d="M 1265 645 h8 m-4-4 v8"/>
    <path d="M 665 490 h6 m-3-3 v6"/>
    <path d="M 885 730 h8 m-4-4 v8"/>
    <path d="M 825 310 h6 m-3-3 v6"/>
    <path d="M 200 300 h8 m-4-4 v8"/>
    <path d="M 1050 620 h6 m-3-3 v6"/>
    <path d="M 1340 500 h6 m-3-3 v6"/>
    <path d="M 580 640 h8 m-4-4 v8"/>
  </g>

  <!-- ── 10. Diamond outlines ─────────────────────────────── -->
  <polygon points="1250,505 1257,495 1264,505 1257,515" fill="none" stroke="#2DDBA8" stroke-opacity="0.28" stroke-width="0.75"/>
  <polygon points="455,645  462,635  469,645  462,655"  fill="none" stroke="#8B97FF" stroke-opacity="0.28" stroke-width="0.75"/>
  <polygon points="925,195  932,185  939,195  932,205"  fill="none" stroke="#F0A855" stroke-opacity="0.24" stroke-width="0.75"/>
  <polygon points="740,570  747,560  754,570  747,580"  fill="none" stroke="#8B4CF7" stroke-opacity="0.22" stroke-width="0.75"/>

  <!-- ── 11. Corner bracket decorations ───────────────────── -->
  <!-- Top-left -->
  <path d="M 48 70 h28 M 48 70 v28 M 58 80 h14 M 58 80 v14"
        stroke="#5B6AF5" stroke-opacity="0.20" stroke-width="0.75" fill="none"/>
  <!-- Top-right -->
  <path d="M 1392 70 h-28 M 1392 70 v28"
        stroke="#8B4CF7" stroke-opacity="0.15" stroke-width="0.75" fill="none"/>
  <!-- Bottom-left -->
  <path d="M 48 830 h28 M 48 830 v-28"
        stroke="#F0A855" stroke-opacity="0.14" stroke-width="0.75" fill="none"/>
  <!-- Bottom-right -->
  <path d="M 1392 830 h-28 M 1392 830 v-28 M 1382 820 h-14 M 1382 820 v-14"
        stroke="#8B4CF7" stroke-opacity="0.18" stroke-width="0.75" fill="none"/>

  <!-- ── 12. Bottom gradient fade ─────────────────────────── -->
  <rect width="1440" height="900" fill="url(#fade)"/>

</svg>